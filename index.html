<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobtail - Premium Booking</title>
    <style>
        /* CSS Variables - Premium Navy Blue */
        :root {
            --bg-dark: #0F2247; 
            --header-bg: #152A55; 
            --card-bg: #1A3063;
            --text-light: #F3F4F6;
            --text-muted: #9CA3AF;
            --accent-orange: #FF5E00; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding-top: 80px; 
            padding-left: 20px;
            padding-right: 20px;
            overflow-x: hidden;
        }

        /* Fixed Premium Header */
        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background-color: var(--header-bg); display: flex;
            justify-content: space-between; align-items: center; padding: 0 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .brand-block { display: flex; align-items: center; gap: 10px; }
        .app-logo { width: 40px; height: 40px; object-fit: contain; }
        .brand-name { font-size: 1.6rem; font-weight: bold; }
        .brand-name span { color: var(--accent-orange); }

        /* Location Action Bar */
        .location-bar {
            max-width: 1200px; margin: 20px auto 30px auto; display: flex;
            justify-content: space-between; align-items: center;
            background-color: var(--header-bg); padding: 15px 25px;
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-status { font-size: 1rem; color: var(--text-muted); }
        
        .locate-btn {
            background-color: transparent; color: var(--accent-orange);
            border: 1px solid var(--accent-orange); padding: 10px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
        }
        .locate-btn:hover { background-color: var(--accent-orange); color: #fff; }

        /* Feed Grid */
        .feed-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px; max-width: 1200px; margin: 0 auto;
        }

        .store-card {
            background-color: var(--card-bg); border-radius: 16px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05); transition: transform 0.3s ease;
        }
        .store-card:hover { transform: translateY(-5px); border-color: rgba(255, 94, 0, 0.5); }
        .card-image { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 20px; }
        .store-title { font-size: 1.2rem; margin-bottom: 5px; }
        .distance-tag {
            display: inline-block; background-color: rgba(255, 94, 0, 0.1);
            color: var(--accent-orange); padding: 4px 10px; border-radius: 6px;
            font-size: 0.85rem; font-weight: 600; margin-bottom: 15px;
        }
        .view-btn {
            width: 100%; background-color: transparent; color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 12px;
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
        }
        .view-btn:hover { background-color: var(--accent-orange); border-color: var(--accent-orange); }

        /* Zomato Style Bottom Sheet */
        .bottom-sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 1999;
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
            backdrop-filter: blur(3px);
        }
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            max-height: 85vh; background-color: var(--card-bg);
            border-radius: 24px 24px 0 0; z-index: 2000;
            padding: 20px 20px 40px 20px; overflow-y: auto;
            transition: bottom 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
        }
        /* Active States (जब स्लाइड ओपन होगा) */
        .bottom-sheet-overlay.active { opacity: 1; visibility: visible; }
        .bottom-sheet.active { bottom: 0; }
        
        /* छोटे डिज़ाइन एलिमेंट्स */
        .sheet-drag-handle { width: 50px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 5px; margin: 0 auto 20px auto; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .close-btn:hover { background: var(--accent-orange); }
        .detail-hero-img { width: 100%; height: 220px; object-fit: cover; border-radius: 16px; margin-bottom: 15px; }
        .premium-tag { background: rgba(255,94,0,0.1); color: var(--accent-orange); padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; display: inline-block; margin-bottom: 15px; border: 1px solid rgba(255,94,0,0.3); }
        .book-btn { width: 100%; background: var(--accent-orange); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(255, 94, 0, 0.4); }

    </style>
</head>
<body>

    <header class="app-header" id="main-header">
        <div class="brand-block">
<img src="logo.jpg" alt="Logo" class="app-logo">
            <div class="brand-name">Hob<span>tail</span></div>
        </div>
        <div style="color: var(--text-muted); font-size: 0.9rem;" id="header-loc">📍 Odisha</div>
    </header>

    <div id="main-content">
        <div class="location-bar">
            <span class="user-status" id="status-text">Loading data...</span>
            <button class="locate-btn" onclick="getUserLocation()">📍 Detect My Location</button>
        </div>
        <main class="feed-container" id="feed-view"></main>
    </div>

    <div class="bottom-sheet-overlay" id="sheet-overlay" onclick="closeDetails()"></div>
    <div class="bottom-sheet" id="bottom-sheet">
        <div class="sheet-drag-handle"></div>
        <button class="close-btn" onclick="closeDetails()">✕</button>
        <div id="detail-content"></div>
    </div>

    <script>
                let storesData = []; // Blank array, अब ये सीधा Google Sheet से भरेगा

        // तुम्हारा लाइव ऑटोमैटिक डेटाबेस लिंक
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxrwy4EBjdHPkLHaSBt-fN7OC12iuAecz8N76kHM3CP1qpEL9TbVpLbYKu_ICYrlocn2m2SbURuN1Z/pub?output=csv';

        // Step 1: Fetch API - Live Google Sheet Load Engine
        async function loadRealData() {
            try {
                document.getElementById('status-text').innerText = "Syncing Live Database...";
                const response = await fetch(sheetUrl);
                const csvText = await response.text();
                
                // जादुई ट्रांसलेटर जो CSV को JSON में बदलेगा
                storesData = csvToJson(csvText);
                
                // Default distance ऐड कर दो
                storesData.forEach(store => store.distance = "Calculating...");
                
                document.getElementById('status-text').innerText = "Live Data loaded successfully.";
                renderFeed();
            } catch (error) {
                console.error("Error loading Live Database:", error);
                document.getElementById('status-text').innerText = "Database connection failed.";
            }
        }

        // CSV to JSON Translator (प्रो-हैक: यह एड्रेस के कॉमा को भी सही से हैंडल करेगा)
        function csvToJson(csv) {
            const lines = csv.split(/\r?\n/);
            const result = [];
            const headers = lines[0].split(',');

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                let obj = {};
                let currentline = [];
                let inQuotes = false;
                let val = '';
                
                for (let char of lines[i]) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        currentline.push(val);
                        val = '';
                    } else {
                        val += char;
                    }
                }
                currentline.push(val);

                for (let j = 0; j < headers.length; j++) {
                    let header = headers[j] ? headers[j].trim() : "";
                    let value = currentline[j] ? currentline[j].trim() : "";
                    // एक्स्ट्रा इन्वर्टेड कॉमा हटाना
                    if (value.startsWith('"') && value.endsWith('"')) value = value.slice(1, -1);
                    if (header) obj[header] = value;
                }
                result.push(obj);
            }
            return result;
        }


        // Step 2: UI Render Logic
        const feedView = document.getElementById('feed-view');
        
        function renderFeed() {
            feedView.innerHTML = '';
            storesData.forEach(store => {
                let displayDistance = store.distance;
                if(displayDistance !== "Calculating...") {
                    displayDistance = displayDistance + " km away";
                }

                feedView.innerHTML += `
                    <article class="store-card">
                        <img src="${store.image}" alt="${store.name}" class="card-image">
                        <div class="card-content">
                            <h3 class="store-title">${store.name}</h3>
                            <span class="distance-tag">${displayDistance}</span>
                            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">${store.address}</p>
                            <button class="view-btn" onclick="openDetails('${store.id}')">View Details</button>
                        </div>
                    </article>
                `;
            });
        }

        // Step 3: Location Engine
        function getUserLocation() {
            document.getElementById('status-text').innerText = "Finding your location...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(processLocation, showError);
            } else {
                document.getElementById('status-text').innerText = "GPS not supported by your browser.";
            }
        }

        function processLocation(position) {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;
            document.getElementById('status-text').innerText = "Sorting nearest centers...";
            document.getElementById('header-loc').innerText = "📍 GPS Active";

            storesData.forEach(store => {
                store.distance = calculateDistance(userLat, userLng, store.lat, store.lng).toFixed(1);
            });

            storesData.sort((a, b) => parseFloat(a.distance) - parseFloat(b.distance));
            renderFeed();
            document.getElementById('status-text').innerText = "Showing nearest centers.";
        }

        // Haversine Formula (Math Logic)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        function showError(error) {
            document.getElementById('status-text').innerText = "Please Allow Location Access.";
            console.error(error);
        }

        // Step 4: Zomato Style Bottom Sheet Logic
        function openDetails(storeId) {
            const store = storesData.find(s => s.id === storeId);
            const detailContent = document.getElementById('detail-content');
            
            // यहाँ हम अंदर का कंटेंट डिज़ाइन कर रहे हैं
            detailContent.innerHTML = `
                <img src="${store.image}" class="detail-hero-img">
                <h1 style="font-size: 1.8rem; margin-bottom: 5px;">${store.name}</h1>
                <p style="color: var(--text-muted); font-size: 1rem; margin-bottom: 15px;">📍 ${store.address}</p>
                
                <div class="premium-tag">⭐ Verified Partner • ${store.distance} km away</div>
                
                <h3 style="margin-bottom: 10px; font-size: 1.2rem;">About Clinic</h3>
                <p style="line-height: 1.6; margin-bottom: 25px; color: var(--text-light); font-size: 0.95rem;">
                    We provide top-quality care, grooming, and medical checkups for your beloved pets. Book an appointment today for a premium experience!
                </p>
                
                <button class="book-btn" onclick="alert('Booking feature coming soon!')">Book Appointment</button>
            `;

            // स्लाइड को ऊपर लाने का जादू
            document.getElementById('sheet-overlay').classList.add('active');
            document.getElementById('bottom-sheet').classList.add('active');
            document.body.style.overflow = 'hidden'; // पीछे का पेज स्क्रॉल होना बंद हो जाएगा
        }

        function closeDetails() {
            // स्लाइड को वापस नीचे भेजने का जादू
            document.getElementById('sheet-overlay').classList.remove('active');
            document.getElementById('bottom-sheet').classList.remove('active');
            document.body.style.overflow = 'auto'; // पीछे का पेज फिर से स्क्रॉल होने लगेगा
        }

        // Start App
        loadRealData();
    </script>
</body>
</html>
