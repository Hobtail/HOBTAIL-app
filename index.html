<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobtail - Premium Booking</title>
    <style>
        /* CSS Variables - Premium Navy Blue */
        :root {
            --bg-dark: #0F2247; 
            --header-bg: #152A55; 
            --card-bg: #1A3063;
            --text-light: #F3F4F6;
            --text-muted: #9CA3AF;
            --accent-orange: #FF5E00; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding-top: 80px; 
            padding-left: 20px;
            padding-right: 20px;
            overflow-x: hidden;
        }

        /* Fixed Premium Header */
        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background-color: var(--header-bg); display: flex;
            justify-content: space-between; align-items: center; padding: 0 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .brand-block { display: flex; align-items: center; gap: 10px; }
        .app-logo { width: 40px; height: 40px; object-fit: contain; }
        .brand-name { font-size: 1.6rem; font-weight: bold; }
        .brand-name span { color: var(--accent-orange); }

        /* Location Action Bar */
        .location-bar {
            max-width: 1200px; margin: 20px auto 30px auto; display: flex;
            justify-content: space-between; align-items: center;
            background-color: var(--header-bg); padding: 15px 25px;
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-status { font-size: 1rem; color: var(--text-muted); }
        
        .locate-btn {
            background-color: transparent; color: var(--accent-orange);
            border: 1px solid var(--accent-orange); padding: 10px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
        }
        .locate-btn:hover { background-color: var(--accent-orange); color: #fff; }

        /* Feed Grid */
        .feed-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px; max-width: 1200px; margin: 0 auto;
        }

        .store-card {
            background-color: var(--card-bg); border-radius: 16px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05); transition: transform 0.3s ease;
        }
        .store-card:hover { transform: translateY(-5px); border-color: rgba(255, 94, 0, 0.5); }
        .card-image { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 20px; }
        .store-title { font-size: 1.2rem; margin-bottom: 5px; }
        .distance-tag {
            display: inline-block; background-color: rgba(255, 94, 0, 0.1);
            color: var(--accent-orange); padding: 4px 10px; border-radius: 6px;
            font-size: 0.85rem; font-weight: 600; margin-bottom: 15px;
        }
        .view-btn {
            width: 100%; background-color: transparent; color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 12px;
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
        }
        .view-btn:hover { background-color: var(--accent-orange); border-color: var(--accent-orange); }

        /* Zomato Style Bottom Sheet */
        .bottom-sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 1999;
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
            backdrop-filter: blur(3px);
        }
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            max-height: 85vh; background-color: var(--card-bg);
            border-radius: 24px 24px 0 0; z-index: 2000;
            padding: 20px 20px 40px 20px; overflow-y: auto;
            transition: bottom 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
        }
        /* Active States (जब स्लाइड ओपन होगा) */
        .bottom-sheet-overlay.active { opacity: 1; visibility: visible; }
        .bottom-sheet.active { bottom: 0; }
                .bottom-sheet.fullscreen { max-height: 100vh; height: 100vh; border-radius: 0; padding-top: 40px; }
                        /* Multi-Media Slider Design */
        /* 1. Static Hero Image (गायब इमेज का फिक्स) */
        .detail-hero-img {
            width: 100%;
            height: 200px;
            border-radius: 20px 20px 0 0;
            object-fit: cover;
        }

        /* 2. Professional Slider Container */
        /* 1. Premium Hero Slider Container */
        .multimedia-slider-container {
            position: relative;
            width: 100%;
            height: 260px;
            background: #000;
            border-radius: 20px 20px 0 0;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .image-slider {
            display: flex;
            width: 100%;
            height: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        .image-slider::-webkit-scrollbar { display: none; }
        
        .slider-item {
            flex: 0 0 100%;
            scroll-snap-align: center;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-item img, .slider-item video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #111;
        }

        /* 2. Sleek Smart Arrows */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 94, 0, 0.5);
            backdrop-filter: blur(4px);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            z-index: 10;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: opacity 0.3s;
        }
        .prev-btn { left: 8px; }
        .next-btn { right: 8px; }

        /* 3. Text Spacing Fix */
        .about-text {
            line-height: 1.6;
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        /* --- 3. THEMED SMART ARROWS (Hobtail Orange Theme) --- */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent-orange); /* तुम्हारी वेबसाइट का थीम कलर */
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            z-index: 10;
            cursor: pointer;
            display: none; /* JS इसे स्मार्टली शो/हाइड करेगा */
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            transition: opacity 0.3s;
        }
        
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }

        .book-btn { width: 100%; background: var(--accent-orange); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(255, 94, 0, 0.4); }

        /* Location Prompt Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 2999;
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
            backdrop-filter: blur(3px);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-box {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%; max-width: 400px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            z-index: 3000;
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-box.active { transform: translate(-50%, -50%) scale(1); opacity: 1; visibility: visible; }
        .modal-title { font-size: 1.4rem; margin-bottom: 10px; }
        .modal-text { font-size: 1rem; color: var(--text-muted); margin-bottom: 25px; }
        .modal-btn {
            width: 100%; background: var(--accent-orange); color: white; border: none; padding: 14px;
            border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer;
        }

        /* Location Bar Animation */
        .location-bar.hidden {
            transition: all 0.5s ease;
            opacity: 0;
            transform: scale(0.8);
            height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

    </style>
</head>
<body>

    <header class="app-header" id="main-header">
        <div class="brand-block">
<img src="logo.jpg" alt="Logo" class="app-logo">
            <div class="brand-name">Hob<span>tail</span></div>
        </div>
        <div style="color: var(--text-muted); font-size: 0.9rem;" id="header-loc">📍 Odisha</div>
    </header>

    <div id="main-content">
        <div class="location-bar">
            <span class="user-status" id="status-text">Loading data...</span>
            <button class="locate-btn" onclick="getUserLocation()">📍 Detect My Location</button>
        </div>
        <main class="feed-container" id="feed-view"></main>
    </div>

    <div class="bottom-sheet-overlay" id="sheet-overlay" onclick="closeDetails()"></div>
    <div class="bottom-sheet" id="bottom-sheet">
        <div class="sheet-drag-handle"></div>
        <div id="detail-content"></div>
    </div>
    
    <div class="modal-overlay" id="location-modal-overlay">
        <div class="modal-box" id="location-modal-box">
            <h2 class="modal-title">Enable Location</h2>
            <p class="modal-text">To find the best pet clinics near you, please enable location services.</p>
            <button class="modal-btn" onclick="requestLocationFromModal()">Detect My Location</button>
            <p style="text-align: center; margin-top: 15px; font-size: 0.8rem; color: var(--text-muted); cursor: pointer;" onclick="closeLocationPrompt()">Maybe later</p>
        </div>
    </div>

    <script>
        let storesData = []; // Blank array, अब ये सीधा Google Sheet से भरेगा
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxrwy4EBjdHPkLHaSBt-fN7OC12iuAecz8N76kHM3CP1qpEL9TbVpLbYKu_ICYrlocn2m2SbURuN1Z/pub?output=csv';

        let userHasUsedLocation = localStorage.getItem('locationUsed') === 'true';
        let lastKnownLocation = localStorage.getItem('lastKnownLocation');

        // Reset UI and storage if location is turned off
        function resetLocationState() {
            localStorage.removeItem('locationUsed');
            localStorage.removeItem('lastKnownLocation');
            userHasUsedLocation = false;

            document.getElementById('header-loc').innerText = '📍 Odisha';
            document.querySelector('.location-bar').classList.remove('hidden');

            if (storesData.length > 0) {
                storesData.forEach(store => store.distance = "Calculating...");
                renderFeed();
            }

            document.getElementById('status-text').innerText = "Please enable location for accurate distances.";
        }

        // Listen for real-time changes in location permission
        async function listenForLocationChanges() {
            if (!navigator.permissions) return;
            try {
                const permissionStatus = await navigator.permissions.query({ name: 'geolocation' });
                permissionStatus.onchange = () => {
                    if (permissionStatus.state !== 'granted') {
                        resetLocationState();
                        showLocationPrompt();
                    }
                };
            } catch (e) {
                console.error("Error setting up permission listener:", e);
            }
        }

        async function initApp() {
            listenForLocationChanges();

            if (lastKnownLocation) {
                document.getElementById('header-loc').innerText = `📍 ${lastKnownLocation}`;
            }

            await loadRealData();

            if (userHasUsedLocation) {
                try {
                    const permission = await navigator.permissions.query({ name: 'geolocation' });
                    if (permission.state === 'granted') {
                        getUserLocation();
                    } else {
                        resetLocationState();
                        showLocationPrompt();
                    }
                } catch(e) {
                    console.log("Permission API not supported. Asking directly.");
                    getUserLocation();
                }
            }
        }

        async function loadRealData() {
            try {
                document.getElementById('status-text').innerText = "Syncing Live Database...";
                const response = await fetch(sheetUrl);
                const csvText = await response.text();
                
                storesData = csvToJson(csvText);
                
                storesData.forEach(store => store.distance = "Calculating...");
                
                document.getElementById('status-text').innerText = "Live Data loaded successfully.";
                renderFeed();
            } catch (error) {
                console.error("Error loading Live Database:", error);
                document.getElementById('status-text').innerText = "Database connection failed.";
            }
        }

        function csvToJson(csv) {
            const lines = csv.split(/\r?\n/);
            const result = [];
            const headers = lines[0].split(',');

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                let obj = {};
                let currentline = [];
                let inQuotes = false;
                let val = '';
                
                for (let char of lines[i]) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        currentline.push(val);
                        val = '';
                    } else {
                        val += char;
                    }
                }
                currentline.push(val);

                for (let j = 0; j < headers.length; j++) {
                    let header = headers[j] ? headers[j].trim() : "";
                    let value = currentline[j] ? currentline[j].trim() : "";
                    if (value.startsWith('"') && value.endsWith('"')) value = value.slice(1, -1);
                    if (header) obj[header] = value;
                }
                 if (currentline.length > 7) {
                    let coverValue = currentline[7] ? currentline[7].trim() : '';
                    if (coverValue.startsWith('"') && coverValue.endsWith('"')) {
                        coverValue = coverValue.slice(1, -1);
                    }
                    obj.cover = coverValue;
                }
                result.push(obj);
            }
            return result;
        }

        const feedView = document.getElementById('feed-view');
        
        function renderFeed() {
            feedView.innerHTML = '';
            storesData.forEach(store => {
                let displayDistance = store.distance;
                if(displayDistance !== "Calculating...") {
                    displayDistance = displayDistance + " km away";
                }

                feedView.innerHTML += `
                    <article class="store-card">
                        <img src="${store.cover}" alt="${store.name}" class="card-image" onerror="this.style.display='none'">
                        <div class="card-content">
                            <h3 class="store-title">${store.name}</h3>
                            <span class="distance-tag">${displayDistance}</span>
                            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">${store.address}</p>
                            <button class="view-btn" onclick="openDetails('${store.id}')">View Details</button>
                        </div>
                    </article>
                `;
            });
        }

        function getUserLocation() {
            document.getElementById('status-text').innerText = "Finding your location...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(processLocation, showError);
            } else {
                document.getElementById('status-text').innerText = "GPS not supported by your browser.";
            }
        }

        async function processLocation(position) {
            localStorage.setItem('locationUsed', 'true');
            userHasUsedLocation = true;

            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;
            document.getElementById('status-text').innerText = "Sorting nearest centers...";

            try {
                const geoResponse = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLng}`);
                const geoData = await geoResponse.json();
                const city = geoData.address.city || geoData.address.town || geoData.address.village || 'Your Area';
                lastKnownLocation = city;
                localStorage.setItem('lastKnownLocation', city);
                document.getElementById('header-loc').innerText = `📍 ${city}`;
            } catch (e) {
                console.error("Reverse geocoding failed", e);
                document.getElementById('header-loc').innerText = "📍 GPS Active"; // Fallback
            }

            document.querySelector('.location-bar').classList.add('hidden');

            storesData.forEach(store => {
                store.distance = calculateDistance(userLat, userLng, store.lat, store.lng).toFixed(1);
            });

            storesData.sort((a, b) => parseFloat(a.distance) - parseFloat(b.distance));
            renderFeed();
            document.getElementById('status-text').innerText = "Showing nearest centers.";
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        function showError(error) {
            let message;
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    resetLocationState();
                    showLocationPrompt();
                    return; // Return early as reset function handles UI
                case error.POSITION_UNAVAILABLE:
                    message = "Location information is unavailable.";
                    break;
                case error.TIMEOUT:
                    message = "The request to get user location timed out.";
                    break;
                default:
                     message = "An error occurred with location services.";
            }
            document.getElementById('status-text').innerText = message;
            console.error(error);
        }

        function openDetails(storeId) {
            const store = storesData.find(s => s.id === storeId);
            const detailContent = document.getElementById('detail-content');
            
            const images = store.image ? store.image.split(',') : [];
            const videoUrl = store.video ? store.video.trim() : '';
            let sliderHtml = '';

            if (videoUrl) {
                sliderHtml += `
                    <div class="slider-item">
                        <video controls controlsList="nodownload" poster="${images[0] || ''}">
                            <source src="${videoUrl}" type="video/mp4">
                        </video>
                    </div>`;
            }

            images.forEach(img => {
                if(img.trim() !== "") {
                    sliderHtml += `<div class="slider-item"><img src="${img.trim()}"></div>`;
                }
            });

            detailContent.innerHTML = `
                <img src="${images[0] || ''}" class="detail-hero-img">

                <div style="padding: 15px;">
                    <h1 style="font-size: 1.8rem; margin: 0;">${store.name}</h1>
                    <p style="color: var(--text-muted); margin-bottom: 15px;">📍 ${store.address}</p>
                    <div class="premium-tag">⭐ Verified Partner</div>

                    <div class="multimedia-slider-container">
                        <button class="nav-btn prev-btn" id="goPrev">&#10094;</button>
                        <div class="image-slider" id="mainSlider">${sliderHtml}</div>
                        <button class="nav-btn next-btn" id="goNext">&#10095;</button>
                    </div>

                    <h3>About Clinic</h3>
                    <p style="color: var(--text-light);">${store.about || 'Premium care.'}</p>
                    <button class="book-btn" onclick="alert('Booking...')">Book Appointment</button>
                </div>
            `;

            const slider = document.getElementById('mainSlider');
            const prevBtn = document.getElementById('goPrev');
            const nextBtn = document.getElementById('goNext');

            function updateArrows() {
                prevBtn.style.display = (slider.scrollLeft <= 5) ? 'none' : 'flex';
                nextBtn.style.display = (slider.scrollLeft + slider.clientWidth >= slider.scrollWidth - 5) ? 'none' : 'flex';
            }

            slider.addEventListener('scroll', updateArrows);
            setTimeout(updateArrows, 150);

            nextBtn.onclick = () => slider.scrollBy({ left: slider.clientWidth, behavior: 'smooth' });
            prevBtn.onclick = () => slider.scrollBy({ left: -slider.clientWidth, behavior: 'smooth' });

            document.getElementById('sheet-overlay').classList.add('active');
            const bottomSheet = document.getElementById('bottom-sheet');
            bottomSheet.classList.add('active');
            bottomSheet.style.transform = 'translateY(0)';
            document.body.style.overflow = 'hidden'; 
            window.history.pushState({ bottomSheet: true }, "");
        }

        function closeDetails() {
            const sheetOverlay = document.getElementById('sheet-overlay');
            if (sheetOverlay.classList.contains('active')) {
                window.history.back(); 
            }
        }
        
        function showLocationPrompt() {
            document.getElementById('location-modal-overlay').classList.add('active');
            document.getElementById('location-modal-box').classList.add('active');
        }

        function closeLocationPrompt() {
            document.getElementById('location-modal-overlay').classList.remove('active');
            document.getElementById('location-modal-box').classList.remove('active');
        }

        function requestLocationFromModal() {
            closeLocationPrompt();
            getUserLocation();
        }

        window.addEventListener('popstate', function(event) {
            const sheetOverlay = document.getElementById('sheet-overlay');
            const bottomSheet = document.getElementById('bottom-sheet');
            
            if (sheetOverlay.classList.contains('active')) {
                sheetOverlay.classList.remove('active');
                bottomSheet.classList.remove('active');
                document.body.style.overflow = 'auto'; 
                
                setTimeout(() => { 
                    bottomSheet.classList.remove('fullscreen'); 
                    bottomSheet.style.transform = ''; 
                }, 300);
            }
        });
        const bottomSheet = document.getElementById('bottom-sheet');
        const dragHandle = bottomSheet.querySelector('.sheet-drag-handle');
        let startY, currentY;

        bottomSheet.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            if (e.target.classList.contains('sheet-drag-handle')) {
                dragHandle.style.background = 'var(--accent-orange)';
            }
        });

        bottomSheet.addEventListener('touchmove', (e) => {
            currentY = e.touches[0].clientY;
            let swipeDistance = currentY - startY;
            if (swipeDistance > 0 && bottomSheet.scrollTop <= 0) {
                bottomSheet.style.transform = `translateY(${swipeDistance}px)`;
            }
        });

        bottomSheet.addEventListener('touchend', (e) => {
            if (dragHandle) dragHandle.style.background = 'rgba(255,255,255,0.2)';
            let swipeDistance = currentY - startY;
            if (swipeDistance > 100 && bottomSheet.scrollTop <= 0) {
                window.history.back();
            } else {
                bottomSheet.style.transform = 'translateY(0)';
            }
        });

        initApp();
    </script>
</body>
</html>
