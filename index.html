<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobtail - Premium Booking</title>
    <style>
        /* CSS Variables - Premium Navy Blue */
        :root {
            --bg-dark: #0F2247; 
            --header-bg: #152A55; 
            --card-bg: #1A3063;
            --text-light: #F3F4F6;
            --text-muted: #9CA3AF;
            --accent-orange: #FF5E00; 
            --accent-orange-dark: #E65500;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding-top: 80px; 
            padding-left: 20px;
            padding-right: 20px;
            overflow-x: hidden;
        }

        /* Fixed Premium Header */
        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background-color: var(--header-bg); display: flex;
            justify-content: space-between; align-items: center; padding: 0 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .brand-block { display: flex; align-items: center; gap: 10px; }
        .app-logo { width: 40px; height: 40px; object-fit: contain; }
        .brand-name { font-size: 1.6rem; font-weight: bold; }
        .brand-name span { color: var(--accent-orange); }

        /* Location Action Bar */
        .location-bar {
            max-width: 1200px; margin: 20px auto 30px auto; display: flex;
            justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            padding: 15px 25px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    		will-change: transform, opacity;
        }

        .user-status { font-size: 1rem; color: var(--text-muted); }
        
        /* Professional Button States */
        .locate-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: transparent;
            color: var(--accent-orange);
            border: 1px solid var(--accent-orange);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
            min-height: 42px;
        }

        .locate-btn:hover {
            background-color: rgba(255, 94, 0, 0.15);
            box-shadow: 0 0 15px rgba(255, 94, 0, 0.3);
        }

        .locate-btn:active {
            transform: scale(0.94);
        }
        
        .locate-btn.detecting {
            background-color: var(--accent-orange-dark);
            color: white;
            cursor: wait;
        }

        .locate-btn svg {
            stroke: currentColor;
        }

        /* Feed Grid */
        .feed-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px; max-width: 1200px; margin: 0 auto;
        }

        .store-card {
            background-color: var(--card-bg); border-radius: 16px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05); transition: transform 0.3s ease;
        }
        .store-card:hover { transform: translateY(-5px); border-color: rgba(255, 94, 0, 0.5); }
        .card-image { width: 100%; height: 180px; object-fit: cover; background: #2a3f7a; }
        .card-content { padding: 20px; }
        .store-title { font-size: 1.2rem; margin-bottom: 5px; }
        .distance-tag {
            display: inline-block; background-color: rgba(255, 94, 0, 0.1);
            color: var(--accent-orange); padding: 4px 10px; border-radius: 6px;
            font-size: 0.85rem; font-weight: 600; margin-bottom: 15px;
        }
        .view-btn {
            width: 100%; background-color: transparent; color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 12px;
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
        }
        .view-btn:hover { background-color: var(--accent-orange); border-color: var(--accent-orange); }

        /* Zomato Style Bottom Sheet */
        .bottom-sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1999; opacity: 0; visibility: hidden; transition: all 0.3s ease; backdrop-filter: blur(3px); }
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 85vh; background-color: var(--card-bg); border-radius: 24px 24px 0 0; z-index: 2000; padding: 20px 20px 40px 20px; overflow-y: auto; transition: bottom 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 -5px 25px rgba(0,0,0,0.5); }
        .bottom-sheet-overlay.active { opacity: 1; visibility: visible; }
        .bottom-sheet.active { bottom: 0; }
        .bottom-sheet.fullscreen { max-height: 100vh; height: 100vh; border-radius: 0; padding-top: 40px; }

        /* Multi-Media Slider */
        .multimedia-slider-container { position: relative; width: 100%; height: 260px; background: #000; border-radius: 20px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .image-slider { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; scrollbar-width: none; }
        .image-slider::-webkit-scrollbar { display: none; }
        .slider-item { flex: 0 0 100%; scroll-snap-align: center; height: 100%; display: flex; align-items: center; justify-content: center; }
        .slider-item img, .slider-item video { width: 100%; height: 100%; object-fit: contain; background: #111; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: var(--accent-orange); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; z-index: 10; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 1.4rem; box-shadow: 0 2px 8px rgba(0,0,0,0.4); transition: opacity 0.3s; }
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }
        .book-btn { width: 100%; background: var(--accent-orange); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(255, 94, 0, 0.4); }

        /* Location Bar Animation */
        .location-bar.hidden { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, height 0s 0.4s, padding 0s 0.4s, margin 0s 0.4s; transform: scale(0.2); opacity: 0; height: 0; padding-top: 0; padding-bottom: 0; margin-top: 0; margin-bottom: 0; overflow: hidden; border-width: 0; }
        
        /* Bottom Nav Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            margin: 0;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .bottom-nav.hidden {
            transform: translateY(100%);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
        }

        .nav-item.active {
            color: var(--accent-orange);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        .nav-item span {
            font-size: 12px;
        }

    </style>
</head>
<body>

    <header class="app-header" id="main-header">
        <div class="brand-block">
            <img src="logo.jpg" alt="Logo" class="app-logo">
            <div class="brand-name">Hob<span>tail</span></div>
        </div>
        <div id="header-loc" style="display: flex; align-items: center; gap: 8px; cursor: pointer;" onclick="getUserLocation()">
			<svg id="header-gps-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22" style="color: var(--text-muted); transition: color 0.3s ease;">
				<path d="M12 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-10c-4.42 0-8 3.58-8 8 0 4.95 6.48 12.12 7.35 13.15.22.26.54.4.85.4s.63-.14.85-.4C13.52 20.12 20 16.95 20 10c0-4.42-3.58-8-8-8zm0 17.38c-1.57-1.8-5.83-6.9-5.83-9.38 0-3.21 2.62-5.83 5.83-5.83s5.83 2.62 5.83 5.83c0 2.48-4.26 7.58-5.83 9.38z"></path>
			</svg>
			<span id="header-loc-text" style="color: var(--text-muted); font-size: 0.9rem; transition: color 0.3s ease;">Set Location</span>
		</div>
    </header>

    <div id="main-content">
        <div class="location-bar">
            <span class="user-status" id="status-text">Loading data...</span>
            <button class="locate-btn" onclick="getUserLocation()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <span id="locate-btn-text">Detect My Location</span>
            </button>
        </div>
        <main class="feed-container" id="feed-view"></main>
    </div>

    <div class="bottom-sheet-overlay" id="sheet-overlay" onclick="closeDetails()"></div>
    <div class="bottom-sheet" id="bottom-sheet">
        <div class="sheet-drag-handle"></div>
        <div id="detail-content"></div>
    </div>
    
    <nav id="bottom-nav" class="bottom-nav">
        <a href="#" class="nav-item active">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
            <span>Search</span>
        </a>
        <a href="#" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"></path></svg>
            <span>Bookings</span>
        </a>
        <a href="#" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script>
        let storesData = []; 
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxrwy4EBjdHPkLHaSBt-fN7OC12iuAecz8N76kHM3CP1qpEL9TbVpLbYKu_ICYrlocn2m2SbURuN1Z/pub?output=csv';

        let userHasUsedLocation = localStorage.getItem('locationUsed') === 'true';
        let lastKnownLocation = localStorage.getItem('lastKnownLocation');

        function resetLocationState() {
            localStorage.removeItem('locationUsed');
            localStorage.removeItem('lastKnownLocation');
            userHasUsedLocation = false;

            document.getElementById('header-loc-text').innerText = 'Set Location';
			const gpsIcon = document.getElementById('header-gps-icon');
			if(gpsIcon) {
				gpsIcon.style.color = 'var(--text-muted)';
				gpsIcon.parentElement.querySelector('#header-loc-text').style.color = 'var(--text-muted)';
			}

            const locationBar = document.querySelector('.location-bar');
			const icon = document.getElementById('header-gps-icon');
			if (locationBar && icon) {
				const iconRect = icon.getBoundingClientRect();
				const originX = iconRect.left + iconRect.width / 2;
				locationBar.style.transformOrigin = `${originX}px 0px`;
			}
			locationBar.classList.remove('hidden');

            if (storesData.length > 0) {
                storesData.forEach(store => store.distance = "Calculating...");
                renderFeed();
            }

            document.getElementById('status-text').innerText = "Please enable location for accurate distances.";
        }

        function listenForLocationChanges() {
            setInterval(async () => {
                if (!navigator.permissions) return;
                try {
                    const permissionStatus = await navigator.permissions.query({ name: 'geolocation' });
                    if (permissionStatus.state === 'granted') {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                const locationBar = document.querySelector('.location-bar');
                                if (!locationBar.classList.contains('hidden')) {
                                     processLocation(position);
                                }
                            },
                            (error) => {
                                const locationBar = document.querySelector('.location-bar');
                                if (locationBar.classList.contains('hidden') && (error.code === 1 || error.code === 2)) {
                                   resetLocationState();
                                }
                            }
                        );
                    } else if (permissionStatus.state === 'denied') {
                        if (localStorage.getItem('locationUsed') === 'true') {
                            resetLocationState();
                        }
                    }
                } catch (e) {
                    // console.error("Error checking location permission:", e);
                }
            }, 3000);
        }

        async function initApp() {
            listenForLocationChanges();
            document.getElementById('header-loc-text').innerText = lastKnownLocation || 'Set Location';

            if (lastKnownLocation) {
                const gpsIcon = document.getElementById('header-gps-icon');
                if (gpsIcon) {
                    gpsIcon.style.color = 'var(--accent-orange)';
                    gpsIcon.parentElement.querySelector('#header-loc-text').style.color = 'var(--text-light)';
                }
            }

            await loadRealData();

            if (userHasUsedLocation) {
                try {
                    const permission = await navigator.permissions.query({ name: 'geolocation' });
                    if (permission.state === 'granted') {
                        getUserLocation();
                    } else {
                        resetLocationState();
                    }
                } catch(e) {
                    // console.log("Permission API not supported. Asking directly.");
                    getUserLocation();
                }
            }
        }

        async function loadRealData(coords) {
            try {
                if (!coords) {
                    document.getElementById('status-text').innerText = "Syncing Live Database...";
                }
                const response = await fetch(sheetUrl);
                const csvText = await response.text();
                storesData = csvToJson(csvText);
                
                if (coords) {
                    storesData.forEach(store => {
                        store.distance = calculateDistance(coords.latitude, coords.longitude, store.lat, store.lng).toFixed(1);
                    });
                    storesData.sort((a, b) => parseFloat(a.distance) - parseFloat(b.distance));
                } else {
                    storesData.forEach(store => store.distance = "Calculating...");
                }

                renderFeed();

                if (!coords) {
                    document.getElementById('status-text').innerText = "Please enable location for accurate distances.";
                }

            } catch (error) {
                console.error("Error loading Live Database:", error);
                document.getElementById('status-text').innerText = "Database connection failed.";
            }
        }

       function csvToJson(csv) {
            const lines = csv.split(/\r?\n/);
            const result = [];
            const headers = lines[0].split(",").map(h => h.trim());

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                let obj = {};
                let currentline = [];
                let inQuotes = false;
                let val = '';

                for (let char of lines[i]) {
                    if (char === '"' && inQuotes) {
                        inQuotes = false;
                    } else if (char === '"' && !inQuotes) {
                        inQuotes = true;
                    } else if (char === ',' && !inQuotes) {
                        currentline.push(val.trim());
                        val = '';
                    } else {
                        val += char;
                    }
                }
                currentline.push(val.trim());

                for (let j = 0; j < headers.length; j++) {
                    if (headers[j]) {
                         let value = currentline[j] || '';
                         // Remove surrounding quotes if they exist, but keep internal ones
                         if (value.startsWith('"') && value.endsWith('"')) {
                             value = value.slice(1, -1);
                         }
                         obj[headers[j]] = value;
                    }
                }
                result.push(obj);
            }
            return result;
        }

        const feedView = document.getElementById('feed-view');
        
        function renderFeed() {
            feedView.innerHTML = '';
            storesData.forEach(store => {
                const distanceTag = store.distance && store.distance !== "Calculating..."
                    ? `<span class="distance-tag">${store.distance} km away</span>`
                    : '';

                feedView.innerHTML += `
                    <article class="store-card" onclick="openDetails('${store.id}')">
                        <img src="${store.cover || ''}" alt="${store.name}" class="card-image" onerror="this.style.background='#2a3f7a'">
                        <div class="card-content">
                            <h3 class="store-title">${store.name}</h3>
                            ${distanceTag}
                            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 6px;">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="16" height="16" style="flex-shrink: 0; margin-top: 2px;">
                                  <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                                </svg>
                                <span>${store.address}</span>
                            </p>
                            <button class="view-btn">View Details</button>
                        </div>
                    </article>
                `;
            });
        }

        function getUserLocation() {
            const locateBtn = document.querySelector('.locate-btn');
            const btnText = document.getElementById('locate-btn-text');

            locateBtn.classList.add('detecting');
            btnText.innerText = 'Detecting...';
            document.getElementById('status-text').innerText = "Finding your location...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(processLocation, (error) => {
                    showError(error);
                    locateBtn.classList.remove('detecting');
                    btnText.innerText = 'Detect My Location';
                });
            } else {
                document.getElementById('status-text').innerText = "GPS not supported by your browser.";
                locateBtn.classList.remove('detecting');
                btnText.innerText = 'Detect My Location';
            }
        }

        async function processLocation(position) {
            const locateBtn = document.querySelector('.locate-btn');
            const btnText = document.getElementById('locate-btn-text');
            localStorage.setItem('locationUsed', 'true');
            userHasUsedLocation = true;

            document.getElementById('status-text').innerText = "Location Detected. Updating list...";
            await loadRealData(position.coords);

            try {
                const geoResponse = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}`);
                const geoData = await geoResponse.json();
                const city = geoData.address.city || geoData.address.town || geoData.address.village || 'Location Detected';
                lastKnownLocation = city;
                localStorage.setItem('lastKnownLocation', city);
                document.getElementById('header-loc-text').innerText = city;
				const gpsIcon = document.getElementById('header-gps-icon');
				if (gpsIcon) {
					gpsIcon.style.color = 'var(--accent-orange)';
					gpsIcon.parentElement.querySelector('#header-loc-text').style.color = 'var(--text-light)';
				}
            } catch (e) {
                console.error("Reverse geocoding failed", e);
                document.getElementById('header-loc-text').innerText = "Location Detected";
            }

            const locationBar = document.querySelector('.location-bar');
			const icon = document.getElementById('header-gps-icon');
			if (locationBar && icon) {
				const iconRect = icon.getBoundingClientRect();
				const barRect = locationBar.getBoundingClientRect();
				const originX = ((iconRect.left + iconRect.width / 2) - barRect.left) / barRect.width * 100;
				locationBar.style.transformOrigin = `${originX}% 0%`;
			}
			locationBar.classList.add('hidden');
            document.getElementById('status-text').innerText = "Showing nearest centers.";
            locateBtn.classList.remove('detecting');
            btnText.innerText = 'Detect My Location';
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        function showError(error) {
            let message;
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    resetLocationState();
                    return;
                case error.POSITION_UNAVAILABLE: message = "Location information is unavailable."; break;
                case error.TIMEOUT: message = "The request to get user location timed out."; break;
                default: message = "An error occurred with location services.";
            }
            document.getElementById('status-text').innerText = message;
            console.error(error);
        }

        function openDetails(storeId) {
            const store = storesData.find(s => s.id === storeId);
            if (!store) return;
            const detailContent = document.getElementById('detail-content');
            const images = (store.image || '').split(',').map(s => s.trim()).filter(Boolean);
            const videoUrl = (store.video || '').trim();
            let sliderHtml = '';

            if (videoUrl) {
                sliderHtml += `
                    <div class="slider-item">
                        <video controls controlsList="nodownload" poster="${images[0] || ''}"><source src="${videoUrl}" type="video/mp4"></video>
                    </div>`;
            }
            images.forEach(img => {
                sliderHtml += `<div class="slider-item"><img src="${img}" alt="${store.name}"></div>`;
            });

            detailContent.innerHTML = `
                <div class="multimedia-slider-container">
                    <button class="nav-btn prev-btn" id="goPrev">&#10094;</button>
                    <div class="image-slider" id="mainSlider">${sliderHtml}</div>
                    <button class="nav-btn next-btn" id="goNext">&#10095;</button>
                </div>
                <div style="padding: 15px;">
                    <h1 style="font-size: 1.8rem; margin: 0; margin-bottom: 5px;">${store.name}</h1>
                    <p style="color: var(--text-muted); margin-bottom: 15px; display: flex; align-items: flex-start; gap: 6px;">
                         <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="16" height="16" style="flex-shrink: 0; margin-top: 2px;">
                          <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                        </svg>
                        <span>${store.address}</span>
                    </p>
                    <h3>About Clinic</h3>
                    <p class="about-text" style="line-height: 1.6; color: var(--text-light); font-size: 0.95rem; margin-bottom: 30px;">${store.about || 'Premium care for your beloved pets.'}</p>
                    <button class="book-btn" onclick="alert('Booking feature coming soon!')">Book Appointment</button>
                </div>
            `;

            const slider = document.getElementById('mainSlider');
            const prevBtn = document.getElementById('goPrev');
            const nextBtn = document.getElementById('goNext');
            function updateArrows() {
                if (!slider) return;
                prevBtn.style.display = (slider.scrollLeft <= 5) ? 'none' : 'flex';
                nextBtn.style.display = (slider.scrollLeft + slider.clientWidth >= slider.scrollWidth - 5) ? 'none' : 'flex';
            }
            slider.addEventListener('scroll', updateArrows);
            setTimeout(updateArrows, 150);
            nextBtn.onclick = () => slider.scrollBy({ left: slider.clientWidth, behavior: 'smooth' });
            prevBtn.onclick = () => slider.scrollBy({ left: -slider.clientWidth, behavior: 'smooth' });

            document.getElementById('sheet-overlay').classList.add('active');
            document.getElementById('bottom-sheet').classList.add('active');
            document.body.style.overflow = 'hidden'; 
            window.history.pushState({open:true}, '');
        }

        function closeDetails() {
            document.getElementById('bottom-sheet').classList.remove('active');
            document.getElementById('sheet-overlay').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        window.addEventListener('popstate', () => closeDetails());

        let lastScrollTop = 0;
        const bottomNav = document.getElementById('bottom-nav');
        window.addEventListener("scroll", function(){
            let st = window.pageYOffset || document.documentElement.scrollTop; 
            if (st > lastScrollTop && st > 50){
                bottomNav.classList.add('hidden');
            } else {
                bottomNav.classList.remove('hidden');
            }
            lastScrollTop = st <= 0 ? 0 : st; // For Mobile or negative scrolling
        }, false);

        initApp();
    </script>
</body>
</html>
