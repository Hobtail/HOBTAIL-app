
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobtail - Premium Booking</title>
    <style>
    /* CSS Variables (The Palette) */
    :root {
        --bg-dark-premium: #152A55;
        --card-dark-lighter: #1d3566;
        --brand-orange: #ff6600;
        --text-white-crisp: #ffffff;
        --text-gray-muted: #cccccc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

    /* Body & Background */
    body {
        background-color: var(--bg-dark-premium);
        color: var(--text-gray-muted);
        padding-top: 80px; 
        padding-left: 20px;
        padding-right: 20px;
        overflow-x: hidden;
    }

    /* Fixed Premium Header */
    .app-header {
        position: fixed; top: 0; left: 0; width: 100%; height: 70px;
        background-color: var(--bg-dark-premium); display: flex;
        justify-content: space-between; align-items: center; padding: 0 30px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08); z-index: 1000;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .brand-block { display: flex; align-items: center; gap: 10px; }
    .app-logo { width: 40px; height: 40px; object-fit: contain; }
    .brand-name { font-size: 1.6rem; font-weight: bold; color: var(--text-white-crisp); }
    .brand-name span { color: var(--brand-orange); }

    /* Location Action Bar */
    .location-bar {
        max-width: 1200px; margin: 20px auto 30px auto; display: flex;
        justify-content: space-between; align-items: center;
        background: var(--card-dark-lighter);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 24px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        padding: 15px 25px;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        will-change: transform, opacity;
    }
    
    .premium-search-container {
        margin: 16px;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        background: var(--card-dark-lighter);
        border-radius: 50px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        position: relative;
        cursor: pointer;
    }

    .search-icon {
        font-size: 16px;
        margin-right: 12px;
        opacity: 0.7;
        z-index: 3;
    }

    .search-input-wrapper {
        position: relative;
        flex: 1;
        height: 20px; 
    }

    #animated-search {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text-white-crisp);
        font-size: 15px;
        font-weight: 400;
        z-index: 2;
        pointer-events: none; 
    }

    .rolling-placeholder {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        opacity: 1;
        transition: opacity 0.3s ease;
        z-index: 1;
    }

    .rolling-placeholder.hidden {
        opacity: 0;
    }

    #rolling-text-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        transition: top 0.6s cubic-bezier(0.77, 0, 0.175, 1);
    }

    #rolling-text-wrapper span {
        display: block;
        line-height: 20px;
        color: rgba(255, 255, 255, 0.6);
    }

    .user-status { font-size: 1rem; color: var(--text-gray-muted); }
    
    .locate-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background-color: transparent;
        color: var(--brand-orange);
        border: 1px solid var(--brand-orange);
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        line-height: 1.2;
        text-align: center;
    }

    .locate-btn:hover {
        background-color: rgba(255, 102, 0, 0.15);
        box-shadow: 0 0 15px rgba(255, 102, 0, 0.3);
    }

    .locate-btn:active {
        transform: scale(0.94);
    }
    
    .locate-btn.detecting {
        background-color: var(--brand-orange);
        color: white;
        cursor: wait;
    }

    .locate-btn svg {
        stroke: currentColor;
    }

    /* Feed Grid */
    .feed-container {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 25px; max-width: 1200px; margin: 0 auto;
    }

    /* --- Premium Clinic Card Styles (The Cards) --- */
    .store-card {
        background-color: var(--card-dark-lighter);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        display: flex;
        flex-direction: column;
    }

    .store-card:hover { 
        transform: translateY(-8px); 
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        border-color: rgba(255, 102, 0, 0.6); 
    }

    .card-image { 
        width: 100%; 
        height: 180px; 
        object-fit: cover; 
        background: #2a3f7a;
        flex-shrink: 0;
    }

    .card-content { 
        padding: 20px; 
        display: flex;
        flex-direction: column;
        flex-grow: 1; /* Allows the button to be pushed to the bottom */
    }

    /* Typography & High Contrast (Usability) */
    .store-title, h2 { 
        font-size: 1.6rem;
        font-weight: bold;
        color: var(--text-white-crisp);
        margin-bottom: 8px;
        line-height: 1.2;
    }
    
    .store-address, .distance-tag, .reviews {
        color: var(--text-gray-muted);
    }

    .store-address {
        font-size: 0.85rem;
        margin-bottom: 15px;
        display: flex;
        align-items: flex-start;
        gap: 6px;
    }

    .store-address svg {
        color: var(--text-gray-muted);
        flex-shrink: 0;
        margin-top: 3px;
    }

    .distance-tag {
        display: inline-block; 
        background-color: rgba(255, 102, 0, 0.15);
        color: var(--brand-orange);
        padding: 5px 12px; 
        border-radius: 8px;
        font-size: 0.9rem; 
        font-weight: 700;
        margin-bottom: 15px;
        align-self: flex-start;
    }

    .rating-info {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
    }

    .rating-info .star {
        font-size: 1.1rem;
        color: #FFC700; /* Golden star */
        line-height: 1;
    }

    .rating-info .rating-number {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-white-crisp);
    }
    
    /* Buttons */
    .view-btn, .book-btn, .micro-card-action, .slider-view-btn {
        background-color: var(--brand-orange);
        color: var(--text-white-crisp);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn-paw-icon {
        width: 16px;
        height: 16px;
        display: inline-block;
        vertical-align: middle;
        margin-left: 8px;
    }

    .view-btn {
        width: 100%; 
        padding: 14px;
        border-radius: 12px; 
        font-weight: bold; 
        font-size: 1rem;
        cursor: pointer; 
        transition: all 0.3s ease;
        margin-top: auto; /* Pushes button to the very bottom */
    }

    .view-btn:hover { 
        background-color: #E65500; /* Darker on hover */
        transform: scale(1.03);
    }

    /* Bottom Sheet */
    .bottom-sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1999; opacity: 0; visibility: hidden; transition: all 0.3s ease; backdrop-filter: blur(3px); }
    .bottom-sheet { position: fixed; bottom: 0; left: 0; width: 100%; max-height: 85vh; background-color: var(--card-dark-lighter); border-radius: 24px 24px 0 0; z-index: 2000; padding: 20px 20px 40px 20px; overflow-y: auto; box-shadow: 0 -5px 25px rgba(0,0,0,0.5); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
    .bottom-sheet-overlay.active { opacity: 1; visibility: visible; }
    .bottom-sheet.active { transform: translateY(0); }
    .bottom-sheet.fullscreen { max-height: 100vh; height: 100vh; border-radius: 0; padding-top: 40px; }

    /* Multi-Media Slider */
    .multimedia-slider-container { position: relative; width: 100%; height: 260px; background: #000; border-radius: 20px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
    
    /* --- Liquid Slider Effect --- */
    .multimedia-slider-container.liquid-active {
        filter: contrast(20);
        background: var(--card-dark-lighter);
    }
    .multimedia-slider-container.liquid-active .image-slider {
        filter: blur(8px);
    }
    /* --- End Liquid Slider Effect --- */

    .image-slider { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; scrollbar-width: none; }
    .image-slider::-webkit-scrollbar { display: none; }
    .slider-item { flex: 0 0 100%; scroll-snap-align: center; height: 100%; display: flex; align-items: center; justify-content: center; }
    .slider-item img, .slider-item video { width: 100%; height: 100%; object-fit: contain; background: #111; }
    .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: var(--brand-orange); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; z-index: 10; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 1.4rem; box-shadow: 0 2px 8px rgba(0,0,0,0.4); transition: opacity 0.3s; }
    .prev-btn { left: 10px; }
    .next-btn { right: 10px; }
    .book-btn { width: 100%; padding: 16px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(255, 94, 0, 0.4); }

    /* Location Bar Animation */
    .location-bar.hidden { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, height 0s 0.4s, padding 0s 0.4s, margin 0s 0.4s; transform: scale(0.2); opacity: 0; height: 0; padding-top: 0; padding-bottom: 0; margin-top: 0; margin-bottom: 0; overflow: hidden; border-width: 0; }
    
    /* Bottom Nav Bar */
    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        box-sizing: box-sizing;
        margin: 0;
        z-index: 1000;
        background: rgba(21, 42, 85, 0.8);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        display: flex;
        justify-content: space-around;
        padding: 10px 0;
        transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .bottom-nav.hidden {
        transform: translateY(100%);
    }

    .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: var(--text-gray-muted);
        text-decoration: none;
    }

    .nav-item.active {
        color: var(--brand-orange);
    }

    .nav-item svg {
        width: 24px;
        height: 24px;
        margin-bottom: 4px;
    }
    
    .nav-item span {
        font-size: 12px;
    }
    
    /* --- Full-Screen Search Overlay --- */
    .search-overlay {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        width: 100vw !important;
        height: 100dvh !important;
        z-index: 9999 !important;
        background: rgba(21, 42, 85, 0.7);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        padding: 20px;
        color: white;
        transform-origin: top center;
        transform: scale(0);
        opacity: 0;
        border-radius: 50%;
        pointer-events: none;
        transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .search-overlay.active {
        transform: scale(1);
        opacity: 1;
        border-radius: 0;
        pointer-events: all;
    }

    .search-overlay-top-bar {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
    }

    .back-icon, .active-search-wrapper, #trending-searches, #search-results {
        transform: translateY(20px);
        opacity: 0;
        transition: all 0.4s ease;
    }

    .search-overlay.active .back-icon, .search-overlay.active .active-search-wrapper {
        transform: translateY(0);
        opacity: 1;
        transition-delay: 0.2s;
    }
    .search-overlay.active .back-icon { opacity: 0.8; }
    .search-overlay.active #trending-searches, .search-overlay.active #search-results {
        transform: translateY(0);
        opacity: 1;
        transition-delay: 0.3s;
    }

    .back-icon {
        cursor: pointer;
        margin-right: 15px;
    }
    .back-icon:hover { opacity: 1; }

    .active-search-wrapper {
        position: relative;
        flex: 1;
    }

    #active-search {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text-white-crisp);
        font-size: 18px;
        font-weight: 500;
        padding: 10px 40px 10px 0;
        border-bottom: 1.5px solid rgba(255, 255, 255, 0.3);
    }

    #active-search::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    @keyframes pulse-mic {
        0% { transform: translateY(-50%) scale(1); fill: none; }
        50% { transform: translateY(-50%) scale(1.2); fill: rgba(255, 68, 68, 0.2); stroke: #ff4444; }
        100% { transform: translateY(-50%) scale(1); fill: none; }
    }

    #voice-search-btn.listening {
        animation: pulse-mic 1s infinite;
        stroke: #ff4444;
    }

    #trending-searches p {
        color: rgba(255, 255, 255, 0.9);
        font-size: 15px;
        font-weight: 500;
    }

    #search-results {
        display: none; 
        max-height: calc(100% - 80px);
        overflow-y: auto;
    }

    /* Micro-card styling */
    .micro-card {
        display: flex;
        align-items: center;
        padding: 12px 5px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: background-color 0.2s;
    }
    .micro-card:hover {
        background-color: rgba(255,255,255,0.05);
    }

    .micro-card img {
        width: 45px;
        height: 45px;
        border-radius: 8px;
        object-fit: cover;
        margin-right: 15px;
        background: #2a3f7a;
    }

    .micro-card-info {
        flex: 1;
    }

    .micro-card-info h4 {
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 3px 0;
        color: var(--text-white-crisp);
    }

    .micro-card-info p {
        font-size: 13px;
        color: var(--text-gray-muted);
        margin: 0;
    }
    
    .micro-card-action {
        padding: 5px 14px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 20px;
        cursor: pointer;
        text-decoration: none;
        transition: background-color 0.2s;
    }
    .micro-card-action:hover {
        background-color: #E65500;
    }

    .highlight {
        color: #ff9800;
        font-weight: bold;
    }

    /* --- Nearest to You Card Styles (TOP SCROLLER) --- */
    #nearest-slider-container {
        margin: 24px 0;
    }
    .slider-wrapper {
        position: relative;
    }
    .glass-slider {
        display: flex;
        overflow-x: auto;
        scroll-behavior: smooth;
        scroll-snap-type: x mandatory;
        gap: 10px;
        padding: 10px calc(50% - 125px);
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    .glass-slider::-webkit-scrollbar {
        display: none;
    }
    .nearest-card {
        background: var(--card-dark-lighter);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        scroll-snap-align: center;
        width: 250px;
        flex-shrink: 0;
        cursor: pointer;
        transition: background-color 0.2s;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin-right: 10px;
    }
    .nearest-card:hover {
        background: #1d3566;
    }
    .nearest-card .card-info-top {
        padding: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        flex-grow: 1;
        justify-content: center;
        gap: 4px;
    }
    .nearest-card h4 {
        font-size: 1.1rem;
        font-weight: 800;
        margin: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-white-crisp);
        width: 100%;
    }
    .top-card-rating {
        display: flex;
        align-items: center;
        gap: 4px;
        color: white;
        font-weight: bold;
    }
    .top-card-address {
        font-size: 12px;
        color: var(--text-gray-muted);
        display: flex;
        align-items: center;
        gap: 4px;
        width: 100%;
        padding: 0 12px;
    }
     .top-card-address-text {
        width: 100%;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        display: block;
        text-align: left;
    }
    .top-card-distance-badge {
        background: rgba(255, 102, 0, 0.15);
        color: var(--brand-orange);
        font-weight: bold;
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 12px;
        margin-top: 5px;
        display: inline-block;
    }
    .slider-view-btn {
        padding: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s;
        margin: 10px;
        width: calc(100% - 20px);
        border-radius: 8px;
    }
    .slide-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(21, 42, 85, 0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.3s;
    }
    .slider-wrapper:hover .slide-btn {
        opacity: 1;
    }
    .slide-btn.left {
        left: -10px;
    }
    .slide-btn.right {
        right: -10px;
    }
</style>
</head>
<body>
    <header class="app-header" id="main-header">
        <div class="brand-block">
            <img src="logo.jpg" alt="Logo" class="app-logo">
            <div class="brand-name">Hob<span>tail</span></div>
        </div>
        <div id="header-loc" style="display: flex; align-items: center; gap: 8px; cursor: pointer;" onclick="getUserLocation()">
			<svg id="header-gps-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22" style="color: var(--text-gray-muted); transition: color 0.3s ease;">
				<path d="M12 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-10c-4.42 0-8 3.58-8 8 0 4.95 6.48 12.12 7.35 13.15.22.26.54.4.85.4s.63-.14.85-.4C13.52 20.12 20 16.95 20 10c0-4.42-3.58-8-8-8zm0 17.38c-1.57-1.8-5.83-6.9-5.83-9.38 0-3.21 2.62-5.83 5.83-5.83s5.83 2.62 5.83 5.83c0 2.48-4.26 7.58-5.83 9.38z"></path>
			</svg>
			<span id="header-loc-text" style="color: var(--text-gray-muted); font-size: 0.9rem; transition: color 0.3s ease;">Set Location</span>
		</div>
    </header>

    <div id="main-content">
        <div class="location-bar">
            <span class="user-status" id="status-text">Loading data...</span>
            <button class="locate-btn" onclick="getUserLocation()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <span id="locate-btn-text">Detect My<br>Location</span>
            </button>
        </div>
        <div class="premium-search-container">
            <span class="search-icon">🔍</span>
            <div class="search-input-wrapper">
                <input type="text" id="animated-search">
                <div id="rolling-placeholder-container" class="rolling-placeholder">
                    <div id="rolling-text-wrapper">
                        <span>Search 'Best Clinics'...</span>
                        <span>Find nearest 'Grooming'...</span>
                        <span>Search 'Pet Medicines'...</span>
                        <span>Find 'Pet Boarding'...</span>
                        <span>Search 'Best Clinics'...</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="nearest-slider-container" style="display: none; opacity: 0; transition: opacity 0.5s ease; margin-bottom: 24px;">
            <h2 style="color: #ffffff; font-size: 18px; font-weight: 600; margin: 0 16px 12px 16px; letter-spacing: 0.5px;">🐾 Nearest Pet Clinics</h2>
            <div class="slider-wrapper">
                <button class="slide-btn left">&#10094;</button>
                <div id="nearest-slider" class="glass-slider"></div>
                <button class="slide-btn right">&#10095;</button>
            </div>
        </div>

        <h2 style="color: #ffffff; font-size: 18px; font-weight: 600; margin: 24px 16px 12px 16px; letter-spacing: 0.5px;">🐾 Top-Rated Pet Clinics</h2>
        <main class="feed-container" id="feed-view"></main>
    </div>

    <div class="bottom-sheet-overlay" id="sheet-overlay"></div>
    <div class="bottom-sheet" id="bottom-sheet">
        <div class="sheet-drag-handle"></div>
        <div id="detail-content"></div>
    </div>
    
    <nav id="bottom-nav" class="bottom-nav">
        <a href="#" class="nav-item active">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
            <span>Home</span>
        </a>
        <a href="javascript:void(0);" id="nav-search-btn" class="nav-item">

    <script>
        const newPawIcon = `<svg class="btn-paw-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path d="M12.0001 19.5C14.2092 19.5 16.0001 17.7091 16.0001 15.5C16.0001 13.2909 14.2092 11.5 12.0001 11.5C9.79098 11.5 8.00006 13.2909 8.00006 15.5C8.00006 17.7091 9.79098 19.5 12.0001 19.5Z" stroke="var(--brand-orange)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8.5 8C9.32843 8 10 7.32843 10 6.5C10 5.67157 9.32843 5 8.5 5C7.67157 5 7 5.67157 7 6.5C7 7.32843 7.67157 8 8.5 8Z" fill="var(--brand-orange)"/><path d="M15.5 8C16.3284 8 17 7.32843 17 6.5C17 5.67157 16.3284 5 15.5 5C14.6716 5 14 5.67157 14 6.5C14 7.32843 14.6716 8 15.5 8Z" fill="var(--brand-orange)"/><path d="M5.5 12C6.32843 12 7 11.3284 7 10.5C7 9.67157 6.32843 9 5.5 9C4.67157 9 4 9.67157 4 10.5C4 11.3284 4.67157 12 5.5 12Z" fill="var(--brand-orange)"/><path d="M18.5 12C19.3284 12 20 11.3284 20 10.5C20 9.67157 19.3284 9 18.5 9C17.6716 9 17 9.67157 17 10.5C17 11.3284 17.6716 12 18.5 12Z" fill="var(--brand-orange)"/></svg>`;

        let storesData = []; 
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxrwy4EBjdHPkLHaSBt-fN7OC12iuAecz8N76kHM3CP1qpEL9TbVpLbYKu_ICYrlocn2m2SbURuN1Z/pub?output=csv';

        let userHasUsedLocation = localStorage.getItem('locationUsed') === 'true';

        function resetLocationState() {
            localStorage.removeItem('locationUsed');
            localStorage.removeItem('lastKnownLocation');
            userHasUsedLocation = false;

            document.getElementById('header-loc-text').innerText = 'Set Location';
			const gpsIcon = document.getElementById('header-gps-icon');
			if(gpsIcon) {

				gpsIcon.parentElement.querySelector('#header-loc-text').style.color = 'var(--text-gray-muted)';
			}

            const locationBar = document.querySelector('.location-bar');
			const icon = document.getElementById('header-gps-icon');
			if (locationBar && icon) {
				const iconRect = icon.getBoundingClientRect();

			}
			locationBar.classList.remove('hidden');
            document.getElementById('nearest-slider-container').style.display = 'none';

            if (storesData.length > 0) {
                storesData.forEach(store => store.distance = "Calculating...");
                renderFeed();
            }

            document.getElementById('status-text').innerText = "Please enable location for accurate distances.";
        }

        function listenForLocationChanges() {
            setInterval(async () => {
                if (!navigator.permissions) return;
                try {
                    const permissionStatus = await navigator.permissions.query({ name: 'geolocation' });
                    if (permissionStatus.state === 'granted') {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                const locationBar = document.querySelector('.location-bar');
                                if (!locationBar.classList.contains('hidden')) {
                                     processLocation(position);
                                }
                            },
                            (error) => {
                                const locationBar = document.querySelector('.location-bar');
                                if (locationBar.classList.contains('hidden') && (error.code === 1 || error.code === 2)) {
                                   resetLocationState();
                                }
                            }
                        );
                    } else if (permissionStatus.state === 'denied') {
                        if (localStorage.getItem('locationUsed') === 'true') {
                            resetLocationState();
                        }
                    }
                } catch (e) {
                    // console.error("Error checking location permission:", e);
                }
            }, 3000);
        }

        async function initApp() {
            listenForLocationChanges();
            document.getElementById('header-loc-text').innerText = lastKnownLocation || 'Set Location';

            if (lastKnownLocation) {
                const gpsIcon = document.getElementById('header-gps-icon');
                if (gpsIcon) {
                    gpsIcon.style.color = 'var(--brand-orange)';
                    gpsIcon.parentElement.querySelector('#header-loc-text').style.color = 'var(--text-white-crisp)';
                }
            }

            await loadRealData();

            if (userHasUsedLocation) {
                try {
                    const permission = await navigator.permissions.query({ name: 'geolocation' });
                    if (permission.state === 'granted') {
                        getUserLocation();
                    } else {
                        resetLocationState();
                    }
                } catch(e) {
                    getUserLocation();
                }
            }
        }

        async function loadRealData(coords) {
            try {
                document.getElementById('status-text').innerText = "Syncing Live Database...";
                const response = await fetch(sheetUrl);
                const csvText = await response.text();
                storesData = csvToJson(csvText);
                
                if (coords) {
                    storesData.forEach(store => {
                        store.distance = calculateDistance(coords.latitude, coords.longitude, store.lat, store.lng).toFixed(1);
                    });
                    storesData.sort((a, b) => parseFloat(a.distance) - parseFloat(b.distance));
                } else {
                    storesData.forEach(store => store.distance = "Calculating...");
                }

                renderFeed();

                if (!coords) {
                    document.getElementById('status-text').innerText = "Please enable location for accurate distances.";
                }

            } catch (error) {
                console.error("Error loading Live Database:", error);
                document.getElementById('status-text').innerText = "Database connection failed.";
            }
        }

       function csvToJson(csv) {
            const lines = csv.split(/\r?\n/);
            const result = [];
            const headers = lines[0].split(",").map(h => h.trim());

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                let obj = {};
                let currentline = [];
                let inQuotes = false;
                let val = '';

                for (let char of lines[i]) {
                    if (char === '"' && inQuotes) {
                        inQuotes = false;
                    } else if (char === '"' && !inQuotes) {
                        inQuotes = true;
                    } else if (char === ',' && !inQuotes) {
                        currentline.push(val.trim());
                        val = '';
                    } else {
                        val += char;
                    }
                }
                currentline.push(val.trim());

                for (let j = 0; j < headers.length; j++) {
                    if (headers[j]) {
                         let value = currentline[j] || '';
                         if (value.startsWith('"') && value.endsWith('"')) {
                             value = value.slice(1, -1);
                         }
                         obj[headers[j]] = value;
                    }
                }
                result.push(obj);
            }
            return result;
        }

        const feedView = document.getElementById('feed-view');
        
        function renderFeed() {

                feedView.innerHTML += `

        function getUserLocation() {
            const locateBtn = document.querySelector('.locate-btn');
            const btnText = document.getElementById('locate-btn-text');

            locateBtn.classList.add('detecting');
            btnText.innerHTML = 'Detecting...<br>&nbsp;';
            document.getElementById('status-text').innerText = "Finding your location...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(processLocation, (error) => {
                    showError(error);
                    locateBtn.classList.remove('detecting');
                    btnText.innerHTML = 'Detect My<br>Location';
                });
            } else {
                document.getElementById('status-text').innerText = "GPS not supported by your browser.";

                btnText.innerHTML = 'Detect My<br>Location';

        async function processLocation(position) {
            const locateBtn = document.querySelector('.locate-btn');
            const btnText = document.getElementById('locate-btn-text');
            localStorage.setItem('locationUsed', 'true');
            userHasUsedLocation = true;

            document.getElementById('status-text').innerText = "Location Detected. Updating list...";
            await loadRealData(position.coords);

            const nearestSliderContainer = document.getElementById('nearest-slider-container');

            if (storesData.length > 0 && nearestSlider) {

                nearestSlider.innerHTML = nearestStores.map(store => {
                    return `

                             <div class="top-card-rating"><svg width="12" height="12" viewBox="0 0 24 24" fill="#FFD700"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> ${store.rating || '4.5'}</div>
                            <div class="top-card-address">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="#d0d0d0"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5-2.5z"/></svg>

                `}).join('');

                nearestSliderContainer.style.display = 'block';
                setTimeout(() => {
                    nearestSliderContainer.style.opacity = '1';
                }, 10);
            }

            try {
                const geoResponse = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}`);
                const geoData = await geoResponse.json();
                const city = geoData.address.city || geoData.address.town || geoData.address.village || 'Location Detected';
                lastKnownLocation = city;
                localStorage.setItem('lastKnownLocation', city);
                document.getElementById('header-loc-text').innerText = city;
				const gpsIcon = document.getElementById('header-gps-icon');
				if (gpsIcon) {
					gpsIcon.style.color = 'var(--brand-orange)';
					gpsIcon.parentElement.querySelector('#header-loc-text').style.color = 'var(--text-white-crisp)';
				}
            } catch (e) {
                console.error("Reverse geocoding failed", e);
                document.getElementById('header-loc-text').innerText = "Location Detected";
            }

            const locationBar = document.querySelector('.location-bar');
			const icon = document.getElementById('header-gps-icon');
			if (locationBar && icon) {
				const iconRect = icon.getBoundingClientRect();
				const barRect = locationBar.getBoundingClientRect();
				const originX = ((iconRect.left + iconRect.width / 2) - barRect.left) / barRect.width * 100;
				locationBar.style.transformOrigin = `${originX}% 0%`;
			}
			locationBar.classList.add('hidden');
            document.getElementById('status-text').innerText = "Showing nearest centers.";
            locateBtn.classList.remove('detecting');
            btnText.innerHTML = 'Detect My<br>Location';
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        function showError(error) {
            let message;
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    resetLocationState();
                    return;
                case error.POSITION_UNAVAILABLE: message = "Location information is unavailable."; break;
                case error.TIMEOUT: message = "The request to get user location timed out."; break;
                default: message = "An error occurred with location services.";
            }
            document.getElementById('status-text').innerText = message;
            console.error(error);
        }

        function openDetails(storeId) {

        initApp();

        // --- Vertical Rolling Placeholder Logic ---
        const searchInput = document.getElementById('animated-search');
        const placeholderContainer = document.getElementById('rolling-placeholder-container');
        const textWrapper = document.getElementById('rolling-text-wrapper');
        if (searchInput && placeholderContainer && textWrapper) {
            const placeholderItems = textWrapper.querySelectorAll('span');
            const itemHeight = 20; 
            let currentIndex = 0;
            let rollInterval;

            const startRolling = () => {
                if(rollInterval) clearInterval(rollInterval);
                rollInterval = setInterval(() => {
                    currentIndex++;
                    textWrapper.style.top = `-${currentIndex * itemHeight}px`;
                    if (currentIndex >= placeholderItems.length - 1) {
                        setTimeout(() => {
                            textWrapper.style.transition = 'none';
                            currentIndex = 0;
                            textWrapper.style.top = '0px';
                            void textWrapper.offsetWidth; 
                            textWrapper.style.transition = 'top 0.6s cubic-bezier(0.77, 0, 0.175, 1)';
                        }, 700);
                    }
                }, 2500);
            };

            const stopRolling = () => {
                clearInterval(rollInterval);
            };

            searchInput.addEventListener('focus', () => {
                placeholderContainer.classList.add('hidden');
                stopRolling();
            });

            searchInput.addEventListener('blur', () => {
                if (searchInput.value.trim() === '') {
                    placeholderContainer.classList.remove('hidden');
                    startRolling();
                }
            });

            searchInput.addEventListener('input', () => {
                if (searchInput.value.trim() !== '') {
                    placeholderContainer.classList.add('hidden');
                    stopRolling();
                } else {
                    if (document.activeElement !== searchInput) {
                        placeholderContainer.classList.remove('hidden');
                        startRolling();
                    }
                }
            });

            startRolling();
        }

            }

            function openSearch() {
                if (searchOverlay.classList.contains('active')) return;
                document.body.style.overflow = 'hidden';
                history.pushState({ searchOpen: true }, '', '#search');
                searchOverlay.classList.add('active');
                setTimeout(() => activeSearchInput.focus({ preventScroll: true }), 400); 
            }

            function closeSearch() {
                document.body.style.overflow = '';
                searchOverlay.classList.remove('active');
                activeSearchInput.value = '';
                activeSearchInput.dispatchEvent(new Event('input'));
            }

            // HIGHEST PRIORITY: Handles auth modal closing
            window.addEventListener('popstate', function(event) { 
                const authModal = document.getElementById('auth-modal'); 
                if (authModal && authModal.style.display === 'flex') { 
                    event.stopImmediatePropagation();
                    closeAuthModal(true); 
                } 
            }, true); // Use Capture phase to ensure this runs first

            // Low priority: Handles other view changes
            window.addEventListener('popstate', (event) => {
                if (searchOverlay.classList.contains('active')) {
                    closeSearch();
                } else if (document.getElementById('bottom-sheet').classList.contains('active')) {
                    closeDetails();
                }
            });


            if (mainSearchBarContainer && searchOverlay && activeSearchInput && backButton && trendingSearches && searchResultsContainer) {
                mainSearchBarContainer.addEventListener('click', openSearch);
                if (navSearchBtn) {
                    navSearchBtn.addEventListener('click', (event) => {
                        event.preventDefault();
                        openSearch();
                    });
                }
                backButton.addEventListener('click', () => history.back());

                activeSearchInput.addEventListener('input', () => {
                    const query = activeSearchInput.value.trim();

                    if (query === '') {
                        trendingSearches.style.display = 'block';
                        searchResultsContainer.style.display = 'none';
                        searchResultsContainer.innerHTML = '';
                        return;
                    }

                    trendingSearches.style.display = 'none';
                    searchResultsContainer.style.display = 'block';

                    const searchWords = query.toLowerCase().split(' ').filter(w => w !== '');
                    const filteredStores = storesData.filter(store => {
                        const storeNameLower = store.name.toLowerCase();
                        return searchWords.every(word => storeNameLower.includes(word));
                    });

                    let resultsHtml = '';
                    if (filteredStores.length > 0) {
                        filteredStores.forEach(store => {
                            const regex = new RegExp(`(${searchWords.join('|')})`, 'gi');
                            const highlightedName = store.name.replace(regex, '<span class="highlight">$1</span>');

                            resultsHtml += `
                                <div class="micro-card" data-store-id="${store.id}">
                                    <img src="${store.cover || ''}" alt="${store.name}" onerror="this.style.background='#2a3f7a'">
                                    <div class="micro-card-info">
                                        <h4>${highlightedName}</h4>
                                        <p>${store.address || 'Address not available'}</p>
                                    </div>
                                    <a class="micro-card-action">View</a>
                                </div>
                            `;
                        });
                    } else {
                        resultsHtml = '<p style="padding: 20px 5px;">No clinics found matching your search.</p>';
                    }
                    searchResultsContainer.innerHTML = resultsHtml;
                });

                searchResultsContainer.addEventListener('click', (e) => {
                    const card = e.target.closest('.micro-card');
                    if (card) {
                        const storeId = card.dataset.storeId;
                        if (storeId) {
                            if (e.target.classList.contains('micro-card-action')) {
                                history.back(); 
                                setTimeout(() => {
                                    const targetCard = document.querySelector(`.store-card[data-store-id="${storeId}"]`);
                                    if (targetCard) {
                                        targetCard.scrollIntoView({
                                            behavior: 'smooth',
                                            block: 'center'
                                        });
                                    }
                                }, 450); 
                            } else {
                                openDetails(storeId);
                            }
                        }
                    }
                });

                // --- Voice Search Logic ---
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition && voiceSearchBtn) {
                    const recognition = new SpeechRecognition();
                    recognition.lang = 'en-US';
                    const originalPlaceholder = activeSearchInput.placeholder;
                    let isListening = false;
                    let micTimeout;

                    recognition.onstart = () => {
                        isListening = true;
                        voiceSearchBtn.classList.add('listening');
                        activeSearchInput.placeholder = 'Listening... 🎤';
                        micTimeout = setTimeout(() => {
                            if (isListening) {
                                recognition.stop();
                            }
                        }, 5000);
                    };

                    recognition.onend = () => {
                        clearTimeout(micTimeout);
                        isListening = false;
                        voiceSearchBtn.classList.remove('listening');
                        activeSearchInput.placeholder = originalPlaceholder;
                    };

                    recognition.onresult = (event) => {
                        clearTimeout(micTimeout);
                        isListening = false;

                        const transcript = event.results[0][0].transcript;
                        activeSearchInput.value = transcript;
                        activeSearchInput.dispatchEvent(new Event('input'));
                    };

                    voiceSearchBtn.addEventListener('click', () => {
                        if (isListening) {
                            recognition.stop();
                        } else {
                            try {
                                recognition.start();
                            } catch (e) {
                                console.error("Voice recognition could not be started.", e);
                            }
                        }
                    });

                    recognition.onerror = (event) => {
                        clearTimeout(micTimeout);
                        isListening = false;
                        voiceSearchBtn.classList.remove('listening');
                        activeSearchInput.placeholder = originalPlaceholder;
                        console.error("Speech recognition error:", event.error);
                    }
                } else if (voiceSearchBtn) {
                    voiceSearchBtn.style.display = 'none';
                }
            }
        });

        const bottomSheet = document.getElementById('bottom-sheet');
        const sheetOverlay = document.getElementById('sheet-overlay');

        if (bottomSheet) {
            let touchStartY = 0;

            bottomSheet.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
                bottomSheet.style.transition = 'none';
            });

            bottomSheet.addEventListener('touchmove', (e) => {
                const touchCurrentY = e.touches[0].clientY;
                const deltaY = touchCurrentY - touchStartY;
                if (deltaY > 0) {
                    bottomSheet.style.transform = `translateY(${deltaY}px)`;
                }
            });

            bottomSheet.addEventListener('touchend', (e) => {
                const touchEndY = e.changedTouches[0].clientY;
                const deltaY = touchEndY - touchStartY;
                bottomSheet.style.transition = 'transform 0.3s ease';

                if (deltaY > 150) {
                    bottomSheet.classList.remove('active');
                    if (sheetOverlay) {
                        sheetOverlay.classList.remove('active');
                    }
                    document.body.style.overflow = '';
                    setTimeout(() => {
                        bottomSheet.style.transform = '';
                    }, 300);
                } else {
                    bottomSheet.style.transform = 'translateY(0)';
                }
            });
        }
    </script>
</body>
</html>
